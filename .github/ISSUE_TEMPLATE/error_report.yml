name: Error Report
description: Report a startup or runtime error in Chiri.
title: "Error: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting this. If Chiri opened this form for you, most of the technical details should already be filled in.

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: What were you doing right before the error happened?
      placeholder: |
        1. Open Chiri
        2. ...
        3. See error
    validations:
      required: true

  - type: textarea
    id: error_message
    attributes:
      label: Error message
      render: text
    validations:
      required: true

  - type: textarea
    id: stack_trace
    attributes:
      label: Stack trace
      render: text

  - type: textarea
    id: component_stack
    attributes:
      label: Component stack
      description: Runtime UI errors may include a React component stack. Startup errors usually will not.
      render: text

  - type: textarea
    id: system_information
    attributes:
      label: System information
    validations:
      required: true

  - type: textarea
    id: additional_context
    attributes:
      label: Additional context
      description: Anything else that might be helpful.
