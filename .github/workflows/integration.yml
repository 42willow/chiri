name: 'Integration'

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'flake.lock'
      - 'flake.nix'
      - 'nix/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'scripts/test-integration-all.sh'
      - 'src/lib/auth/**'
      - 'src/lib/caldav/**'
      - 'src/lib/ical/**'
      - 'src/lib/push/**'
      - 'src/lib/store/**'
      - 'src/tests/integration/**'
      - 'vitest.config.ts'
      - '.github/workflows/integration.yml'
  push:
    branches:
      - main
      - master
      - develop
    paths:
      - 'flake.lock'
      - 'flake.nix'
      - 'nix/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'scripts/test-integration-all.sh'
      - 'src/lib/auth/**'
      - 'src/lib/caldav/**'
      - 'src/lib/ical/**'
      - 'src/lib/push/**'
      - 'src/lib/store/**'
      - 'src/tests/integration/**'
      - 'vitest.config.ts'
      - '.github/workflows/integration.yml'

permissions:
  contents: read

concurrency:
  group: integration-${{ github.ref }}
  cancel-in-progress: true

jobs:
  integration:
    name: CalDAV
    runs-on: ubuntu-22.04
    timeout-minutes: 75
    steps:
      - uses: actions/checkout@v6

      - name: Install Nix
        uses: cachix/install-nix-action@v25

      - name: Set up Cachix
        uses: cachix/cachix-action@v17
        with:
          name: ${{ vars.CACHIX_CACHE_NAME || 'chiri' }}
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          skipPush: ${{ secrets.CACHIX_AUTH_TOKEN == '' || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository) }}

      - name: Install Node dependencies
        run: nix develop -c pnpm install --frozen-lockfile

      - name: Run CalDAV integration tests
        run: nix develop -c pnpm test:integration:all
