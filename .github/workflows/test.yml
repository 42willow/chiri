name: 'Checks'

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
      - master
      - develop

permissions:
  contents: read

concurrency:
  group: checks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint and format check
        run: pnpm exec biome check .

      - name: Run tests
        run: pnpm test

  nix:
    name: Nix
    runs-on: ubuntu-22.04
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v25

      - name: Evaluate flake outputs
        run: nix flake show --all-systems

      - name: Build source package
        run: nix build .#source --print-build-logs

  rust:
    name: Rust
    runs-on: ubuntu-22.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v25

      - name: Check Rust formatting
        run: nix develop -c cargo fmt --manifest-path src-tauri/Cargo.toml -- --check

      - name: Run Rust tests
        run: nix develop -c cargo test --manifest-path src-tauri/Cargo.toml --all-targets

      - name: Run Clippy
        run: nix develop -c cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings
