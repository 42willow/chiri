name: 'Post-release'

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to process, for example app-v0.9.0. Defaults to master package version.'
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: post-release-${{ github.event_name == 'release' && github.event.release.tag_name || inputs.tag || github.ref }}
  cancel-in-progress: false

jobs:
  version-metadata:
    name: Version metadata
    if: github.event_name == 'workflow_dispatch' || startsWith(github.event.release.tag_name, 'app-v')
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'release' && github.event.release.tag_name || inputs.tag || 'master' }}

      - name: Verify version fields
        id: version
        env:
          INPUT_TAG: ${{ inputs.tag }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail

          PACKAGE_VERSION=$(jq -r '.version' package.json)
          TAURI_VERSION=$(jq -r '.version' src-tauri/tauri.conf.json)
          CARGO_VERSION=$(awk -F '"' '/^version = "/ { print $2; exit }' src-tauri/Cargo.toml)

          echo "package.json: $PACKAGE_VERSION"
          echo "tauri.conf.json: $TAURI_VERSION"
          echo "Cargo.toml: $CARGO_VERSION"

          if [ "$PACKAGE_VERSION" != "$TAURI_VERSION" ] || [ "$PACKAGE_VERSION" != "$CARGO_VERSION" ]; then
            echo "::error::Version mismatch across package.json, tauri.conf.json, and Cargo.toml"
            exit 1
          fi

          if [ "$GITHUB_EVENT_NAME" = "release" ]; then
            TAG="$RELEASE_TAG"
          elif [ -n "$INPUT_TAG" ]; then
            TAG="$INPUT_TAG"
          else
            TAG="app-v$PACKAGE_VERSION"
          fi

          VERSION="${TAG#app-v}"
          if [ "$VERSION" = "$TAG" ]; then
            echo "::error::Release tag must use the app-v prefix"
            exit 1
          fi

          if [ "$VERSION" != "$PACKAGE_VERSION" ]; then
            echo "::error::Tag $TAG does not match package version $PACKAGE_VERSION"
            exit 1
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

  finalize:
    name: Finalize
    needs: version-metadata
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: master
          fetch-depth: 1

      - name: Install Nix
        uses: cachix/install-nix-action@v25

      - name: Set up Cachix
        uses: cachix/cachix-action@v17
        with:
          name: ${{ vars.CACHIX_CACHE_NAME || 'chiri' }}
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          skipPush: ${{ secrets.CACHIX_AUTH_TOKEN == '' }}

      - name: Verify expected release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.version-metadata.outputs.tag }}
          VERSION: ${{ needs.version-metadata.outputs.version }}
        run: |
          set -euo pipefail

          gh release view "$TAG" --repo "$GITHUB_REPOSITORY" --json assets --jq '.assets[].name' > assets.txt
          cat assets.txt

          expected_assets=(
            "latest.json"
            "Chiri_${VERSION}_x64-setup.exe"
            "Chiri_${VERSION}_x64-setup.exe.sig"
            "Chiri_${VERSION}_arm64-setup.exe"
            "Chiri_${VERSION}_arm64-setup.exe.sig"
            "Chiri_${VERSION}_x64_en-US.msi"
            "Chiri_${VERSION}_x64_en-US.msi.sig"
            "Chiri_${VERSION}_arm64_en-US.msi"
            "Chiri_${VERSION}_arm64_en-US.msi.sig"
            "Chiri_${VERSION}_aarch64.dmg"
            "Chiri_${VERSION}_x64.dmg"
            "Chiri_aarch64.app.tar.gz"
            "Chiri_aarch64.app.tar.gz.sig"
            "Chiri_x64.app.tar.gz"
            "Chiri_x64.app.tar.gz.sig"
            "Chiri_${VERSION}_amd64.deb"
            "Chiri_${VERSION}_amd64.deb.sig"
            "Chiri_${VERSION}_arm64.deb"
            "Chiri_${VERSION}_arm64.deb.sig"
            "Chiri-${VERSION}-1.x86_64.rpm"
            "Chiri-${VERSION}-1.x86_64.rpm.sig"
            "Chiri-${VERSION}-1.aarch64.rpm"
            "Chiri-${VERSION}-1.aarch64.rpm.sig"
          )

          missing=0
          for asset in "${expected_assets[@]}"; do
            if ! grep -qxF "$asset" assets.txt; then
              echo "::error::Missing release asset: $asset"
              missing=1
            fi
          done

          exit "$missing"

      - name: Verify updater metadata
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.version-metadata.outputs.tag }}
          VERSION: ${{ needs.version-metadata.outputs.version }}
        run: |
          set -euo pipefail

          mkdir -p release-assets
          gh release download "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern latest.json \
            --dir release-assets \
            --clobber

          jq -e --arg version "$VERSION" '.version == $version' release-assets/latest.json
          jq -e '.platforms | type == "object" and length > 0' release-assets/latest.json

          jq -er '.platforms[]?.url' release-assets/latest.json | while IFS= read -r url; do
            case "$url" in
              "https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}/"*)
                ;;
              *)
                echo "::error::Unexpected updater asset URL: $url"
                exit 1
                ;;
            esac
          done

      - name: Update Nix package hashes
        env:
          VERSION: ${{ needs.version-metadata.outputs.version }}
        run: |
          set -euo pipefail

          BIN_PACKAGE_FILE="nix/packages/binary.nix"
          BASE_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/app-v${VERSION}"

          get_hash() {
            local url="$1"
            local tmpfile
            tmpfile=$(mktemp)
            echo "Downloading: $url" >&2
            curl -fsSL --retry 5 --retry-delay 5 -o "$tmpfile" "$url"
            nix hash file --type sha256 --sri "$tmpfile"
            rm -f "$tmpfile"
          }

          X64_LINUX_HASH=$(get_hash "${BASE_URL}/Chiri_${VERSION}_amd64.deb")
          ARM64_LINUX_HASH=$(get_hash "${BASE_URL}/Chiri_${VERSION}_arm64.deb")
          X64_DARWIN_HASH=$(get_hash "${BASE_URL}/Chiri_${VERSION}_x64.dmg")
          ARM64_DARWIN_HASH=$(get_hash "${BASE_URL}/Chiri_${VERSION}_aarch64.dmg")

          sed -i "s/version ? \"[^\"]*\"/version ? \"$VERSION\"/" "$BIN_PACKAGE_FILE"

          awk -v x64_linux="$X64_LINUX_HASH" -v arm64_linux="$ARM64_LINUX_HASH" \
              -v x64_darwin="$X64_DARWIN_HASH" -v arm64_darwin="$ARM64_DARWIN_HASH" '
          {
            if ($0 ~ /"x86_64-linux"/) { platform = "x64_linux"; }
            else if ($0 ~ /"aarch64-linux"/) { platform = "arm64_linux"; }
            else if ($0 ~ /"x86_64-darwin"/) { platform = "x64_darwin"; }
            else if ($0 ~ /"aarch64-darwin"/) { platform = "arm64_darwin"; }

            if ($0 ~ /hash = "sha256-/) {
              if (platform == "x64_linux") { sub(/hash = "sha256-[^"]*"/, "hash = \"" x64_linux "\""); platform = ""; }
              else if (platform == "arm64_linux") { sub(/hash = "sha256-[^"]*"/, "hash = \"" arm64_linux "\""); platform = ""; }
              else if (platform == "x64_darwin") { sub(/hash = "sha256-[^"]*"/, "hash = \"" x64_darwin "\""); platform = ""; }
              else if (platform == "arm64_darwin") { sub(/hash = "sha256-[^"]*"/, "hash = \"" arm64_darwin "\""); platform = ""; }
            }
            print;
          }' "$BIN_PACKAGE_FILE" > "$BIN_PACKAGE_FILE.tmp" && mv "$BIN_PACKAGE_FILE.tmp" "$BIN_PACKAGE_FILE"

          chmod +x ./scripts/update-hashes.sh
          ./scripts/update-hashes.sh

      - name: Verify updated Nix source package
        run: nix build .#source --print-build-logs

      - name: Update README links
        env:
          VERSION: ${{ needs.version-metadata.outputs.version }}
        run: |
          set -euo pipefail

          sed -i -E "s|app-v[0-9]+\.[0-9]+\.[0-9]+|app-v${VERSION}|g" README.md
          sed -i -E "s|[Cc]hiri_[0-9]+\.[0-9]+\.[0-9]+|Chiri_${VERSION}|g" README.md
          sed -i -E "s|[Cc]hiri-[0-9]+\.[0-9]+\.[0-9]+|Chiri-${VERSION}|g" README.md

      - name: Commit and push changes
        env:
          VERSION: ${{ needs.version-metadata.outputs.version }}
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add README.md nix/packages/binary.nix nix/packages/source.nix

          if git diff --staged --quiet; then
            echo "No post-release changes to commit"
          else
            git commit -m "chore: finalize post-release updates for v${VERSION}"
            git push origin master
          fi
